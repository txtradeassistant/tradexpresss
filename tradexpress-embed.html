<script>
// Auto-load from URL param ?src= or ?articlesUrl=
(function(){
  const params = new URLSearchParams(location.search);
  const src = params.get('src') || params.get('articlesUrl') || 'articles.json';
  const theme = params.get('theme') || 'dark';
  // Init after script loads
  if(window.TradExpress){
    TradExpress.init({selector:'#tradexpress-feed', articlesUrl: src, theme: theme, enableAimAsk: true});
  }
  // Listen for parent postMessage to inject many articles dynamically
  window.addEventListener('message', (e)=>{
    if(e.data && e.data.type==='tradexpress:load' && e.data.articles){
      if(window.TradExpress){
        TradExpress.articles = e.data.articles;
        TradExpress.render();
      }
    }
  });
  // Expose for parent
  window.TradExpressEmbed = {
    loadArticles: (articles)=>{ TradExpress.articles = articles; TradExpress.render(); },
    addArticle: (a)=> TradExpress.addArticle(a)
  };
})();
</script>
